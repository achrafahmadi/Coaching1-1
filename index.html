<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching — أشرف الأحمدي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #e2c06a;
  --gold3: #8a6d2a;
  --ink: #141414;
  --ink2: #1a1a1a;
  --ink3: #222222;
  --ink4: #2a2a2a;
  --line: rgba(255,255,255,0.06);
  --line2: rgba(255,255,255,0.11);
  --text: #f0f0f0;
  --text2: #b8b8b8;
  --text3: #787878;
  --red: #c0392b;
  --green: #27ae60;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; height: auto; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  height: auto;
}

/* ── TEXTURE HERO ── */
.hero {
  position: relative;
  padding: 60px 24px 40px;
  text-align: center;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* SVG noise texture overlay */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

/* Radial gold glow */
.hero::after {
  content: '';
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 500px;
  background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.12) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* Geometric lines pattern */
.hero-lines {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.hero-lines svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0.06;
}

.hero-inner { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; }

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 28px;
  opacity: 0.9;
}
.hero-eyebrow::before,
.hero-eyebrow::after {
  content: '';
  width: 28px;
  height: 1px;
  background: var(--gold);
  opacity: 0.6;
}

.hero h1 {
  font-size: clamp(36px, 8vw, 54px);
  font-weight: 900;
  line-height: 1.2;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-bottom: 16px;
}
.hero h1 em {
  font-style: normal;
  color: var(--gold);
  position: relative;
}
.hero h1 em::after {
  content: '';
  position: absolute;
  bottom: 2px;
  right: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(to left, var(--gold), transparent);
}

.hero-sub {
  font-size: 20px;
  color: var(--text2);
  line-height: 1.9;
  font-weight: 300;
  max-width: 380px;
  margin: 0 auto;
}

/* Gold separator */
.sep {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 48px auto 0;
  max-width: 200px;
}
.sep-line { flex: 1; height: 1px; background: var(--line2); }
.sep-diamond {
  width: 6px; height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.8;
}

/* ── FORM BODY ── */
.body {
  max-width: 520px;
  margin: 0 auto;
  padding: 0;
}

/* ── SECTION ── */
.section { margin-bottom: 52px; }
.section-label {
  font-size: 15px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

/* ── FIELD ── */
.field { margin-bottom: 20px; }
.field:last-child { margin-bottom: 0; }
.field-label {
  font-size: 18px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
  display: block;
}
.field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line2);
  padding: 12px 0;
  font-size: 24px;
  color: var(--text);
  font-family: 'Inter', 'Cairo', sans-serif;
  font-weight: 400;
  outline: none;
  transition: border-color 0.3s;
  direction: rtl;
  border-radius: 0;
}
.field input:focus { border-bottom-color: var(--gold); }
.field input::placeholder { color: var(--text3); font-size: 22px; }
input[type="number"]::-webkit-inner-spin-button { opacity: 0.15; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* Phone */
.phone-row { display: flex; flex-direction: row-reverse; gap: 0; align-items: flex-end; border-bottom: 1px solid var(--line2); transition: border-color 0.3s; }
.phone-row:focus-within { border-bottom-color: var(--gold); }
.phone-row select {
  background: transparent;
  border: none;
  color: var(--text2);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  outline: none;
  cursor: pointer;
  padding: 12px 4px 12px 0;
  direction: ltr;
  min-width: 95px;
  flex-shrink: 0;
}
.phone-row select option { background: var(--ink2); color: var(--text); }
.phone-row input {
  flex: 1;
  border: none;
  border-bottom: none;
  padding: 12px 0;
  direction: ltr;
  text-align: left;
}
.phone-divider { width: 1px; height: 20px; background: var(--line2); margin-bottom: 12px; }

/* ── GOAL CARDS ── */
.goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.goal-card {
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 28px 20px 24px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
  position: relative;
  background: transparent;
  font-family: 'Cairo', sans-serif;
}
.goal-card:hover { border-color: var(--gold3); background: rgba(201,168,76,0.03); }
.goal-card.on {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.goal-card.on::before {
  content: '✓';
  position: absolute;
  top: 10px;
  left: 10px;
  width: 20px; height: 20px;
  background: var(--gold);
  color: var(--ink);
  font-size: 14px;
  font-weight: 900;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 20px;
  text-align: center;
}
.goal-emoji { font-size: 46px; margin-bottom: 12px; display: block; }
.goal-name {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 5px;
  transition: color 0.2s;
}
.goal-card.on .goal-name { color: var(--gold); }
.goal-desc { font-size: 18px; color: var(--text3); line-height: 1.6; }

/* ── PLAN ── */
.plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.plan-card {
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 24px 18px 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  background: transparent;
  font-family: 'Cairo', sans-serif;
  text-align: center;
  overflow: hidden;
}
.plan-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.3s;
}
.plan-card:hover { border-color: var(--gold3); }
.plan-card:hover::before { transform: scaleX(0.5); }
.plan-card.on { border-color: var(--gold); background: rgba(201,168,76,0.04); }
.plan-card.on::before { transform: scaleX(1); }
.plan-badge {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  padding: 4px 10px;
  border: 1px solid;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 14px;
}
.badge-start { color: var(--text3); border-color: var(--text3); }
.badge-elite { color: var(--gold); border-color: var(--gold3); }
.plan-months {
  font-family: 'Cairo', sans-serif;
  font-size: 36px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -1px;
}
.plan-card.on .plan-months { color: var(--text); }
.plan-amount {
  font-size: 27px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 14px;
}
.plan-sep-line { height: 1px; background: var(--line); margin-bottom: 12px; }
.plan-card.on .plan-sep-line { background: rgba(201,168,76,0.2); }
.commit-track {
  background: var(--ink4);
  border-radius: 10px;
  height: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}
.commit-fill {
  height: 100%;
  border-radius: 10px;
  background: var(--text3);
  transition: background 0.3s;
}
.plan-card.on .commit-fill { background: var(--gold); }
.plan-tagline { font-size: 18px; color: var(--text3); font-style: italic; line-height: 1.5; }
.plan-card.on .plan-tagline { color: var(--gold2); opacity: 0.8; }
.save-tag {
  position: absolute;
  top: 8px; right: 8px;
  background: var(--gold);
  color: var(--ink);
  font-size: 11px;
  font-weight: 800;
  padding: 2px 6px;
  border-radius: 2px;
  letter-spacing: 0.5px;
}

/* Commit reveal */
.commit-msg {
  margin-top: 16px;
  padding: 18px 20px;
  border-right: 2px solid var(--gold);
  background: rgba(201,168,76,0.04);
  display: none;
  animation: slideDown 0.3s ease;
}
.commit-msg.show { display: block; }
@keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
.commit-text {
  font-size: 20px;
  color: var(--text2);
  line-height: 1.9;
  font-style: italic;
}
.commit-author { font-size: 15px; color: var(--gold3); margin-top: 8px; letter-spacing: 1px; }

/* ── TERMS ── */
.terms-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  flex-direction: row-reverse;
  border: 1px solid var(--line);
  border-radius: 12px;
}
.terms-row input[type="checkbox"] {
  width: 15px; height: 15px;
  accent-color: var(--gold);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 3px;
}
.terms-text {
  font-size: 19px;
  color: var(--text3);
  line-height: 1.7;
  text-align: right;
}
.terms-text a {
  color: var(--text2);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  transition: color 0.2s;
}
.terms-text a:hover { color: var(--gold); }

/* ── SUBMIT ── */
.submit-wrap { margin-top: 32px; }
.submit-btn {
  width: 100%;
  background: var(--gold);
  border: none;
  padding: 18px 24px;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--ink);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  text-transform: uppercase;
  border-radius: 12px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.submit-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.submit-btn:hover { background: var(--gold2); transform: translateY(-1px); }
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled { background: var(--ink4); color: var(--text3); cursor: not-allowed; transform: none; }

/* ── SUCCESS ── */
#successPage { display: none; max-width: 520px; margin: 0 auto; padding: 0; }
#successPage.visible { display: block; padding: 40px 20px 40px; }
.success-mark {
  width: 56px; height: 56px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 27px;
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.success-title {
  font-size: 43px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.success-sub {
  font-size: 19px;
  color: var(--text2);
  text-align: center;
  line-height: 1.8;
  margin-bottom: 48px;
  font-weight: 300;
}

/* Pay Hero */
.pay-hero { margin-bottom: 16px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line2); }
.pay-hero-head {
  text-align: center;
  padding: 36px 24px 28px;
  border: none;
  border-bottom: 1px solid var(--line2);
  position: relative;
  background: rgba(201,168,76,0.03);
}
.pay-hero-head::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(to left, transparent, var(--gold), transparent);
}
.pay-lbl {
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--gold3);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 10px;
}
.pay-plan-name { font-size: 20px; color: var(--text2); margin-bottom: 8px; }
.pay-amount {
  font-family: 'Cairo', sans-serif;
  font-size: 58px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -2px;
  margin-bottom: 4px;
}
.pay-amount span { font-size: 24px; font-weight: 500; color: var(--gold3); letter-spacing: 0; margin-right: 4px; }
.pay-hint { font-size: 18px; color: var(--text3); margin-top: 8px; }

.pay-methods { display: grid; grid-template-columns: 1fr 1fr; border-top: none; border-bottom: 1px solid var(--line2); }
.pay-method-btn {
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  border-left: 1px solid var(--line2);
  transition: all 0.15s;
  font-family: 'Cairo', sans-serif;
}
.pay-method-btn:last-child { border-left: none; }
.pay-method-btn:hover { background: rgba(255,255,255,0.03); }
.pay-method-btn.active { background: rgba(201,168,76,0.05); border-bottom: 2px solid var(--gold); }
.pmb-icon { font-size: 24px; margin-bottom: 4px; }
.pmb-name { font-size: 19px; color: var(--text); font-weight: 600; }
.pmb-sub { font-size: 16px; color: var(--text3); margin-top: 2px; }

.pay-details {
  display: none;
  border: 1px solid var(--line2);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 20px;
  animation: slideDown 0.2s ease;
}
.pay-details.show { display: block; }

.pay-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  flex-direction: row-reverse;
  gap: 12px;
}
.pay-row:last-of-type { border-bottom: none; }
.pay-key { font-size: 18px; color: var(--text3); letter-spacing: 0.5px; white-space: nowrap; }
.pay-val {
  font-size: 20px;
  color: var(--text);
  font-weight: 500;
  text-align: left;
  word-break: break-all;
  font-family: 'Cairo', sans-serif;
  direction: ltr;
}
.copy-btn {
  background: transparent;
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 3px 8px;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text3);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  text-transform: uppercase;
  transition: all 0.15s;
  margin-right: 8px;
}
.copy-btn:hover { border-color: var(--gold3); color: var(--gold); }

.rib-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin: 10px 0 6px;
}
.rib-cell {
  background: var(--ink3);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
}
.rib-cell-label { font-size: 14px; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 4px; }
.rib-cell-val { font-size: 22px; color: var(--gold); font-weight: 700; font-family: 'Cairo', sans-serif; }
.rib-compte {
  background: var(--ink3);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.rib-compte-label { font-size: 15px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.rib-compte-val { font-size: 20px; color: var(--gold); font-weight: 700; letter-spacing: 1px; font-family: 'Cairo', sans-serif; direction: ltr; }

.wa-btn {
  width: 100%;
  margin-top: 14px;
  background: transparent;
  border: 1px solid rgba(39,174,96,0.4);
  padding: 12px;
  font-size: 16px;
  font-weight: 600;
  color: #27ae60;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  border-radius: 1px;
}
.wa-btn:hover { background: rgba(39,174,96,0.08); border-color: #27ae60; }

/* Summary */
.summary {
  margin-top: 16px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 20px;
}
.summary-title {
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--text3);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 14px;
}
.sum-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
  gap: 12px;
  flex-direction: row-reverse;
}
.sum-row:last-child { border-bottom: none; }
.sum-k { font-size: 18px; color: var(--text3); white-space: nowrap; }
.sum-v { font-size: 19px; color: var(--text); font-weight: 500; text-align: left; font-family: 'Cairo', sans-serif; }

/* Terms Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--ink2);
  border-top: 1px solid var(--line2);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 640px;
  max-height: 88vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.modal-top {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal-top-title {
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 700;
}
.modal-close {
  background: transparent;
  border: 1px solid var(--line2);
  width: 28px; height: 28px;
  color: var(--text3);
  font-size: 19px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: 'Cairo', sans-serif;
}
.modal-close:hover { border-color: var(--gold3); color: var(--text); }
.modal-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.modal-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
}
.modal-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.modal-body {
  overflow-y: auto;
  padding: 24px 20px;
  flex: 1;
  text-align: right;
}
.modal-body h3 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.modal-body h4 {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold3);
  margin: 18px 0 8px;
  font-weight: 700;
}
.modal-body p, .modal-body li { font-size: 18px; color: var(--text2); line-height: 1.9; margin-bottom: 8px; font-weight: 300; }
